<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chalé Solara — Visualizador BIM | Maré Engenharia</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-estrutural : #12223C;
            --azul-fundacao   : #182A47;
            --azul-mare       : #203864;
            --azul-projeto    : #2F4C73;
            --azul-tecnico    : #426B99;
            --branco          : #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; font-family:'Lato',sans-serif; background:var(--azul-estrutural); color:var(--branco); overflow:hidden; }

        header {
            height:58px; background:var(--azul-fundacao);
            border-bottom:2px solid var(--azul-tecnico);
            display:flex; align-items:center; padding:0 20px; gap:14px; z-index:10; position:relative;
        }
        header img.logo { height:36px; object-fit:contain; }
        .brand { display:flex; flex-direction:column; line-height:1.2; }
        .brand-name { font-size:16px; font-weight:900; letter-spacing:2.5px; }
        .brand-sub  { font-size:9px; font-weight:300; letter-spacing:3px; color:var(--azul-tecnico); text-transform:uppercase; }
        .sep { width:1px; height:34px; background:var(--azul-projeto); margin:0 4px; }
        .parceiro { display:flex; flex-direction:column; align-items:center; gap:3px; }
        .parceiro-label { font-size:8px; font-weight:300; letter-spacing:2px; text-transform:uppercase; color:var(--azul-tecnico); }
        .parceiro img { height:24px; object-fit:contain; filter:brightness(0) invert(1); }
        .proj-info { margin-left:auto; text-align:right; }
        .proj-nome  { font-size:13px; font-weight:700; letter-spacing:1.5px; }
        .proj-cli   { font-size:10px; color:var(--azul-tecnico); font-weight:300; }

        #layout { display:flex; height:calc(100% - 58px); }

        #sidebar {
            width:230px; background:var(--azul-fundacao);
            border-right:1px solid var(--azul-projeto);
            padding:18px 14px; display:flex; flex-direction:column; gap:7px; flex-shrink:0;
        }
        .sb-title { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--azul-tecnico); margin-bottom:4px; }
        .disc-btn {
            display:flex; align-items:center; gap:10px; padding:11px 13px;
            border:1px solid var(--azul-projeto); border-radius:7px; background:transparent;
            color:var(--branco); font-family:'Lato',sans-serif; font-size:13px;
            cursor:pointer; transition:all .15s; width:100%; text-align:left;
        }
        .disc-btn:hover:not(:disabled) { background:var(--azul-mare); }
        .disc-btn.on   { background:var(--azul-mare); border-color:var(--azul-tecnico); }
        .disc-btn.off  { opacity:.35; }
        .disc-btn.wait { opacity:.55; cursor:default; }
        .dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
        .lbl { flex:1; }
        .eye { font-size:13px; }
        .divider { height:1px; background:var(--azul-projeto); margin:4px 0; }
        .dica { margin-top:auto; padding:11px 12px; background:var(--azul-mare); border-radius:7px; font-size:10px; color:var(--azul-tecnico); line-height:1.85; }
        .dica strong { display:block; color:var(--branco); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
        .rodape { padding-top:12px; font-size:9px; color:var(--azul-projeto); text-align:center; letter-spacing:.5px; line-height:1.6; }

        #viewer { flex:1; position:relative; overflow:hidden; }
        #viewer canvas { display:block; width:100%!important; height:100%!important; outline:none; }

        #overlay {
            position:absolute; inset:0; background:var(--azul-estrutural);
            display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:30;
        }
        #overlay.gone { display:none; }
        .spinner { width:46px; height:46px; border:3px solid var(--azul-projeto); border-top-color:var(--azul-tecnico); border-radius:50%; animation:giro .8s linear infinite; }
        @keyframes giro { to { transform:rotate(360deg); } }
        #msg-load { font-size:12px; color:var(--azul-tecnico); letter-spacing:1.5px; font-weight:300; }

        @media (max-width:620px) {
            #sidebar { width:100%; height:auto; flex-direction:row; flex-wrap:wrap; padding:8px; border-right:none; border-bottom:1px solid var(--azul-projeto); gap:6px; }
            .sb-title,.divider,.dica,.rodape { display:none; }
            .disc-btn { flex:1; min-width:100px; padding:8px; }
            #layout { flex-direction:column; }
        }
    </style>
</head>
<body>

<header>
    <img class="logo" src="logo.png" alt="Maré Engenharia" onerror="this.style.display='none'">
    <div class="brand">
        <span class="brand-name">MARÉ</span>
        <span class="brand-sub">Engenharia</span>
    </div>
    <div class="sep"></div>
    <div class="parceiro">
        <span class="parceiro-label">Realização</span>
        <img src="logo-camacho.png" alt="Camacho Construct" onerror="this.style.display='none'">
    </div>
    <div class="sep"></div>
    <div class="parceiro">
        <span class="parceiro-label">Cliente</span>
        <img src="logo-washington.png" alt="Washington Construtora" onerror="this.style.display='none'">
    </div>
    <div class="proj-info">
        <div class="proj-nome">CHALÉ SOLARA</div>
        <div class="proj-cli">Projeto BIM — Instalações Prediais</div>
    </div>
</header>

<div id="layout">
    <div id="sidebar">
        <div class="sb-title">Disciplinas</div>
        <button class="disc-btn wait" id="btn-arc"   onclick="tog('arc')"   disabled><span class="dot" style="background:#B0BEC5"></span><span class="lbl">Arquitetura</span><span class="eye" id="eye-arc">👁</span></button>
        <button class="disc-btn wait" id="btn-hidro" onclick="tog('hidro')" disabled><span class="dot" style="background:#4FC3F7"></span><span class="lbl">Hidrossanitário</span><span class="eye" id="eye-hidro">👁</span></button>
        <button class="disc-btn wait" id="btn-ele"   onclick="tog('ele')"   disabled><span class="dot" style="background:#FFD54F"></span><span class="lbl">Elétrico</span><span class="eye" id="eye-ele">👁</span></button>
        <div class="divider"></div>
        <div class="dica">
            <strong>Navegação 3D</strong>
            🖱 Girar — arrastar (esq)<br>
            🖱 Mover — arrastar (dir)<br>
            🔲 Zoom — scroll / pinça<br>
            📱 Mobile — dois dedos
        </div>
        <div class="rodape">Maré Engenharia<br>Eng.º Felipe Moreno</div>
    </div>
    <div id="viewer"></div>
</div>

<div id="overlay">
    <div class="spinner"></div>
    <div id="msg-load">Iniciando visualizador…</div>
</div>

<script type="module">
// ── Helpers de mensagem ───────────────────────────────────────────────────
const setMsg = t => { document.getElementById('msg-load').textContent = t; };
const setErr = t => {
    const el = document.getElementById('msg-load');
    el.textContent = '⚠ ' + t;
    el.style.color = '#FF7043';
    el.style.maxWidth = '340px';
    el.style.textAlign = 'center';
    el.style.lineHeight = '1.6';
};

// ── Carregar bibliotecas com erro visível ─────────────────────────────────
setMsg('Carregando Three.js…');
let THREE, OrbitControls, IFCLoader;

try {
    THREE = await import('https://esm.sh/three@0.135.0');
} catch (e) {
    setErr('Falha ao carregar Three.js.\n' + e.message);
    console.error('[VIEWER] three:', e);
    throw e;
}

try {
    const m = await import('https://esm.sh/three@0.135.0/examples/jsm/controls/OrbitControls');
    OrbitControls = m.OrbitControls;
} catch (e) {
    setErr('Falha ao carregar OrbitControls.\n' + e.message);
    console.error('[VIEWER] OrbitControls:', e);
    throw e;
}

setMsg('Carregando engine IFC…');
try {
    const m = await import('https://esm.sh/web-ifc-three@0.0.116');
    IFCLoader = m.IFCLoader;
    if (!IFCLoader) throw new Error('IFCLoader não encontrado no módulo web-ifc-three');
} catch (e) {
    setErr('Falha ao carregar IFCLoader.\n' + e.message);
    console.error('[VIEWER] IFCLoader:', e);
    throw e;
}

// ── Cena ──────────────────────────────────────────────────────────────────
const container = document.getElementById('viewer');
const W = () => container.clientWidth;
const H = () => container.clientHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W(), H());
renderer.setClearColor(0x12223C);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.01, 2000);
camera.position.set(15, 10, 15);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sol = new THREE.DirectionalLight(0xffffff, 1.0);
sol.position.set(10, 20, 10);
scene.add(sol);
const fill = new THREE.DirectionalLight(0x426B99, 0.3);
fill.position.set(-10, 5, -10);
scene.add(fill);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.05;
controls.screenSpacePanning = true;

// ── IFC Loader ────────────────────────────────────────────────────────────
setMsg('Iniciando WASM…');
const ifcLoader = new IFCLoader();
try {
    await ifcLoader.ifcManager.setWasmPath('https://unpkg.com/web-ifc@0.0.44/');
} catch (e) {
    setErr('Falha ao iniciar WASM web-ifc.\n' + e.message);
    console.error('[VIEWER] WASM:', e);
    throw e;
}

// ── Disciplinas ───────────────────────────────────────────────────────────
const DISCS = {
    arc  : { arquivo: 'CHALE-ARC-EX-0001-MODE-R00.ifc', label: 'Arquitetura'     },
    hidro: { arquivo: 'CHALE-HID-EX-0001-MODE-R00.ifc', label: 'Hidrossanitário' },
    ele  : { arquivo: 'CHALE-ELE-EX-0001-MODE-R00.ifc', label: 'Elétrico'        },
};

const modelos = {};
const visivel = {};
let carregados = 0;
const total = Object.keys(DISCS).length;
let primeiroCarregado = false;

async function carregar(id, cfg) {
    setMsg(`Carregando ${cfg.label}…`);
    try {
        const modelo = await ifcLoader.loadAsync(cfg.arquivo);
        modelos[id] = modelo;
        visivel[id] = true;
        scene.add(modelo);

        if (!primeiroCarregado) {
            primeiroCarregado = true;
            const box = new THREE.Box3().setFromObject(modelo);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const dist = Math.max(size.x, size.y, size.z) * 1.5;
            camera.position.set(center.x + dist, center.y + dist * 0.5, center.z + dist);
            controls.target.copy(center);
            controls.update();
        }

        const btn = document.getElementById(`btn-${id}`);
        btn.classList.remove('wait');
        btn.classList.add('on');
        btn.disabled = false;
        console.log(`[VIEWER] ${cfg.label} carregado ✓`);
    } catch (e) {
        console.warn(`[VIEWER] ${id} falhou:`, e.message);
        const btn = document.getElementById(`btn-${id}`);
        btn.classList.remove('wait');
        btn.disabled = true;
        btn.style.opacity = '0.25';
        btn.title = 'Arquivo não encontrado';
    } finally {
        carregados++;
        if (carregados >= total) {
            document.getElementById('overlay').classList.add('gone');
        }
    }
}

window.tog = function(id) {
    if (!modelos[id]) return;
    visivel[id] = !visivel[id];
    modelos[id].visible = visivel[id];
    document.getElementById(`btn-${id}`).classList.toggle('on',  visivel[id]);
    document.getElementById(`btn-${id}`).classList.toggle('off', !visivel[id]);
    document.getElementById(`eye-${id}`).textContent = visivel[id] ? '👁' : '🚫';
};

// Carregar todos em sequência
for (const [id, cfg] of Object.entries(DISCS)) {
    await carregar(id, cfg);
}

// ── Loop de renderização ──────────────────────────────────────────────────
(function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
})();

new ResizeObserver(() => {
    camera.aspect = W() / H();
    camera.updateProjectionMatrix();
    renderer.setSize(W(), H());
}).observe(container);

</script>
</body>
</html>
